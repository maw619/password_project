<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Password Vault{% endblock %}</title>
  <style>
    :root {
      --bg: #020617;
      --surface: #0b1220;
      --surface-soft: #111c31;
      --card: #0f172a;
      --muted: #94a3b8;
      --text: #f8fafc;
      --accent: #22c55e;
      --accent-2: #38bdf8;
      --border: #1e293b;
      --danger: #fda4af;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(175deg, #0b1430 0%, var(--bg) 42%);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .app-shell {
      width: min(1020px, 100%);
      margin: 0 auto;
      min-height: 100vh;
      padding: 1rem 0.85rem 1.5rem;
    }

    .mobile-topbar {
      background: rgba(15, 23, 42, 0.65);
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 18px;
      padding: 0.8rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(12px);
      margin-bottom: 1rem;
      box-shadow: 0 12px 24px rgba(2, 6, 23, 0.55);
      gap: 0.75rem;
    }

    .topbar-actions { margin-left: auto; }

    .link-btn {
      border: 1px solid rgba(148, 163, 184, 0.24);
      background: rgba(15, 23, 42, 0.8);
      color: #cbd5e1;
      border-radius: 10px;
      padding: 0.4rem 0.7rem;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
    }

    .app-name {
      margin: 0;
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #cbd5e1;
      font-weight: 700;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 99px;
      background: var(--accent);
      box-shadow: 0 0 14px rgba(34, 197, 94, 0.8);
    }

    .card {
      background: linear-gradient(180deg, #101b31 0%, #0b1324 100%);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 18px 40px rgba(2, 6, 23, 0.5);
      padding: 1rem;
    }

    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.85rem;
      margin-bottom: 0.9rem;
    }

    h1 {
      margin: 0;
      font-size: 1.35rem;
      letter-spacing: 0.02em;
    }

    p {
      color: var(--muted);
      margin: 0.35rem 0 0;
      font-size: 0.95rem;
      line-height: 1.4;
    }

    .btn {
      background: linear-gradient(140deg, #34d399, #22c55e);
      color: #052e16;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      padding: 0.64rem 0.95rem;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      white-space: nowrap;
    }

    .btn.secondary {
      background: linear-gradient(120deg, #7dd3fc, #38bdf8);
      color: #082f49;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(15, 23, 42, 0.8);
    }

    .table-wrap {
  overflow-x: auto;
  border: 1px solid var(--border);
  border-radius: 14px;
  background: rgba(15, 23, 42, 0.8);
}

.password-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 0;
}

.password-table th,
.password-table td {
  border-bottom: 1px solid rgba(148, 163, 184, 0.16);
  padding: 0.78rem;
  text-align: left;
  vertical-align: top;
  font-size: 0.95rem;
  overflow-wrap: anywhere;
}

.password-table th {
  color: #cbd5e1;
  font-size: 0.73rem;
  text-transform: uppercase;
  letter-spacing: 0.09em;
  background: rgba(2, 6, 23, 0.55);
}

.password-table code {
  color: #bbf7d0;
  white-space: normal;
  overflow-wrap: anywhere;
}

@media (max-width: 700px) {
  .table-wrap {
    border: none;
    background: transparent;
    overflow-x: visible;
  }

  .password-table,
  .password-table tbody,
  .password-table tr,
  .password-table td {
    display: block;
    width: 100%;
  }

  .password-table thead {
    display: none;
  }

  .password-table tr {
    background: rgba(15, 23, 42, 0.9);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 0.75rem;
    margin-bottom: 0.85rem;
  }

  .password-table td {
    border-bottom: 1px solid rgba(148, 163, 184, 0.14);
    padding: 0.65rem 0;
  }

  .password-table td:last-child {
    border-bottom: none;
  }

  .password-table td::before {
    content: attr(data-label);
    display: block;
    margin-bottom: 0.25rem;
    color: #94a3b8;
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
}
    a { color: #7dd3fc; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 1.2rem;
    }

    form label {
      display: block;
      margin-bottom: 0.33rem;
      color: #dbeafe;
      font-weight: 600;
      font-size: 0.92rem;
    }

    form input {
      width: 100%;
      margin-bottom: 0.95rem;
      padding: 0.75rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #020617;
      color: #e2e8f0;
      font-size: 0.97rem;
    }

    .helper-note {
      color: var(--muted);
      font-size: 0.8rem;
      margin-top: -0.45rem;
      margin-bottom: 0.9rem;
    }

    .search-box {
  margin-bottom: 1rem;
}

    .search-box input {
      width: 100%;
      padding: 0.85rem 1rem;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.85);
      color: white;
      font-size: 0.95rem;
      outline: none;
    }

    .search-box input:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
    }

    @media (max-width: 560px) {
      .app-shell { padding: 0.75rem 0.65rem 1.25rem; }
      .card { border-radius: 20px; padding: 0.85rem; }
      .header { flex-direction: column; }
      .header .btn { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <div class="mobile-topbar">
      <p class="app-name">Password Vault</p>
      <span class="status-dot" aria-hidden="true"></span>
      {% if user.is_authenticated %}
      <div class="topbar-actions">
        <form method="post" action="{% url 'logout' %}">
          {% csrf_token %} 
          <button class="link-btn" type="submit">Log out</button>
        </form>
      </div>
      {% endif %}
    </div>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
