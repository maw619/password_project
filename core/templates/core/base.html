<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Password Vault{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 bg-gradient-to-b from-slate-900 to-slate-950 text-slate-100 antialiased">
  <main class="mx-auto min-h-screen w-full max-w-6xl px-4 py-6">
    <div class="mb-6 flex items-center gap-3 rounded-2xl border border-slate-700 bg-slate-900/80 px-4 py-3 shadow-lg backdrop-blur">
      <p class="m-0 text-sm font-bold uppercase tracking-widest text-slate-300">Password Vault</p>
      <span class="h-2.5 w-2.5 rounded-full bg-emerald-400 shadow-[0_0_14px_rgba(52,211,153,0.85)]" aria-hidden="true"></span>
      {% if user.is_authenticated %}
      <div class="ml-auto">
        <form method="post" action="{% url 'logout' %}">
          {% csrf_token %} 
          <button class="rounded-lg border border-slate-600 bg-slate-800 px-3 py-1.5 text-sm font-medium text-slate-200 hover:bg-slate-700" type="submit">Log out</button>
        </form>
      </div>
      {% endif %}
    </div>
    {% block content %}{% endblock %}
  </main>
  <script>
    document.querySelectorAll('input, select, textarea').forEach((el) => {
      el.classList.add('w-full', 'rounded-lg', 'border', 'border-slate-600', 'bg-slate-950', 'px-3', 'py-2', 'text-slate-100', 'placeholder:text-slate-500', 'focus:border-sky-400', 'focus:outline-none');
    });
  </script>
</body>
</html>
