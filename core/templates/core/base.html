<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Password Manager{% endblock %}</title>
  <style>
    :root {
      --bg: #f3f4f8;
      --text: #1f2937;
      --muted: #6b7280;
      --surface: #ffffff;
      --line: #e5e7eb;
      --primary: #4f46e5;
      --primary-dark: #3730a3;
      --success: #0f766e;
      --danger: #be123c;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, Arial, sans-serif; background: var(--bg); color: var(--text); }
    .wrap { width: min(1100px, 94%); margin: 2rem auto; }
    .hero {
      background: linear-gradient(135deg, #4338ca 0%, #7c3aed 60%, #0ea5e9 100%);
      border-radius: 18px;
      color: white;
      padding: 1.4rem;
      box-shadow: 0 14px 30px rgba(67, 56, 202, 0.25);
      margin-bottom: 1rem;
    }
    .hero h1 { margin: 0; font-size: 1.7rem; }
    .hero p { margin: .4rem 0 0; opacity: 0.95; }
    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
      padding: 1.2rem;
    }
    .row { display: flex; justify-content: space-between; align-items: center; gap: .8rem; flex-wrap: wrap; }
    .btn {
      text-decoration: none;
      border: none;
      border-radius: 10px;
      padding: .62rem .95rem;
      font-weight: 700;
      cursor: pointer;
      display: inline-block;
      background: var(--primary);
      color: #fff;
    }
    .btn:hover { background: var(--primary-dark); }
    .btn.alt { background: #0ea5e9; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { padding: .75rem; border-bottom: 1px solid var(--line); text-align: left; }
    th { background: #f8fafc; font-size: .82rem; text-transform: uppercase; color: #475569; }
    td small { color: var(--muted); }
    a { color: var(--primary); }
    .empty { text-align: center; color: var(--muted); padding: 1.2rem; }
    .field { margin-bottom: .85rem; }
    label { display: block; font-weight: 600; margin-bottom: .3rem; }
    input {
      width: 100%; padding: .65rem .7rem; border-radius: 10px;
      border: 1px solid #d1d5db; outline: none;
    }
    input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.18); }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>Password Manager</h1>
      <p>Save credentials and jump directly to each website login page.</p>
    </section>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
