<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Password Manager</title>
</head>
<body>
  <h1>Password Manager</h1>
  <p><a href="{% url 'credential-create' %}">Add new credential</a></p>

  <table border="1" cellpadding="6">
    <thead>
      <tr>
        <th>Website</th>
        <th>Website Link</th>
        <th>Username</th>
        <th>Password</th>
      </tr>
    </thead>
    <tbody>
      {% for credential in credentials %}
        <tr>
          <td>{{ credential.website_name }}</td>
          <td><a href="{{ credential.website_url }}" target="_blank" rel="noreferrer">{{ credential.website_url }}</a></td>
          <td>{{ credential.username }}</td>
          <td>{{ credential.password }}</td>
        </tr>
      {% empty %}
        <tr>
          <td colspan="4">No credentials stored yet.</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
