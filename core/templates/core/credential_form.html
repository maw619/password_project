{% extends "core/base.html" %}

{% block title %}Add Credential{% endblock %}

{% block content %}
<section class="card" style="max-width: 640px; margin: 0 auto;">
  <div class="header">
    <h1>Add Credential</h1>
    <a class="btn secondary" href="{% url 'credential-list' %}">Back</a>
  </div>

  <form method="post">
    {% csrf_token %}

    <label for="id_website_name">Website name</label>
    {{ form.website_name }}

    <label for="id_website_url">Website URL</label>
    {{ form.website_url }}

    <label for="id_username">Username</label>
    {{ form.username }}

    <label for="id_password">Password</label>
    {{ form.password }}

    <button class="btn" type="submit">Save credential</button>
  </form>
</section>
{% endblock %}
