{% extends "core/base.html" %}

{% block title %}Add Credential{% endblock %}

{% block content %}
<section class="card" style="max-width:700px; margin:0 auto;">
  <div class="row" style="margin-bottom: 1rem;">
    <h2 style="margin:0">Add Credential</h2>
    <a class="btn alt" href="{% url 'credential-list' %}">Back to List</a>
  </div>

  <form method="post">
    {% csrf_token %}

    <div class="field">
      <label for="id_website_name">Website name</label>
      {{ form.website_name }}
    </div>

    <div class="field">
      <label for="id_website_url">Website URL</label>
      {{ form.website_url }}
    </div>

    <div class="field">
      <label for="id_username">Username</label>
      {{ form.username }}
    </div>

    <div class="field">
      <label for="id_password">Password</label>
      {{ form.password }}
    </div>

    <button class="btn" type="submit">Save Credential</button>
  </form>
</section>
{% endblock %}
