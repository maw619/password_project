{% extends "core/base.html" %}

{% block title %}Password Vault{% endblock %}

{% block content %} 

<form method="POST" enctype="multipart/form-data">
  {% csrf_token %}

  <label>Upload Chrome password CSV:</label>
  <input type="file" name="password_csv" accept=".csv" required>

  <button type="submit" class="btn">Import Passwords</button> 

</form>
<br>
    <a  href="{% url 'credential-list' %}">go back</a>

{% endblock %}
