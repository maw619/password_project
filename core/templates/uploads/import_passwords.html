{% extends "core/base.html" %}

{% block title %}Password Vault{% endblock %}

{% block content %} 

<section class="mx-auto max-w-2xl rounded-2xl border border-slate-700 bg-slate-900/80 p-6 shadow-xl">
  <h1 class="text-2xl font-semibold">Import Passwords</h1>
  <p class="mt-1 text-sm text-slate-400">Upload your Chrome CSV export to add credentials in bulk.</p>

  <form method="POST" enctype="multipart/form-data" class="mt-4 space-y-4">
    {% csrf_token %}

    <label class="block text-sm font-medium text-slate-200">Upload Chrome password CSV:</label>
    <input type="file" name="password_csv" accept=".csv" required>

    <button type="submit" class="rounded-lg bg-emerald-400 px-4 py-2 text-sm font-semibold text-emerald-950 hover:bg-emerald-300">Import Passwords</button>
  </form>

  <a class="mt-4 inline-flex text-sm text-sky-300 hover:text-sky-200" href="{% url 'credential-list' %}">Go back</a>
</section>

{% endblock %}
